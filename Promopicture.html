<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
/* Remove all default spacing */
html, body {
    margin: 0;
    padding: 0;
    background: #000;
}

/* EXACT SIZE LOCK */
.wrapper {
    width: 317px;
    height: 573px;
    overflow: hidden;
    border: 1px solid #00bfff;
    font-family: Arial, Helvetica, sans-serif;
    color: #00bfff;
}

/* HEADER IMAGE */
.header-img {
    width: 100%;
    display: block;
}

/* SUBHEADER */
.subheader {
    font-size: 12px;
    text-align: center;
    padding: 4px;
    border-bottom: 1px solid #00bfff;
}

/* CONTENT AREA */
.content {
    padding: 5px;
    font-size: 12px;
    line-height: 1.15;
}

/* VERSION */
.version {
    font-weight: bold;
    margin-top: 4px;
}

/* BULLET STYLE */
.item::before {
    content: "■ ";
}

/* DIVIDER */
.divider {
    border-bottom: 1px solid #00bfff;
    margin: 5px 0;
}
</style>
</head>

<body>

<div class="wrapper">

    <img src="promoart.png" class="wrapper">

    </div>

</div>

</body>
</html>
